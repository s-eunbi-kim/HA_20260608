name: Feature
description: 신규 기능, 개선 사항, 완료 기준을 등록합니다.
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        - 요청 배경과 해결하려는 문제를 분리
        - 제안 범위와 제외 범위를 명확히 작성
        - 완료 기준은 검증 가능한 조건으로 작성
  - type: textarea
    id: summary
    attributes:
      label: 기능 요약
      description: 요청 기능과 기대 효과를 간단히 작성
      placeholder: |
        - 기능명:
        - 기대 효과:
        - 대상 사용자:
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 배경 및 문제
      description: 현재 문제, 제약 사항, 개선 필요성 작성
      placeholder: |
        - 현재 상태:
        - 문제점:
        - 개선 필요성:
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안 내용
      description: 구현 방향, 주요 동작, 제외 범위 작성
      placeholder: |
        - 주요 동작:
        - 입력/출력:
        - 제외 범위:
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: 개발 완료 여부를 판단할 수 있는 검증 조건 작성
      placeholder: |
        - 사용자는 ...
        - 시스템은 ...
        - 결과는 ...
        - 예외 상황은 ...
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: 추가 참고사항
      description: 관련 화면, 문서, 예시, 제약 사항 작성
      placeholder: |
        - 관련 문서:
        - 참고 화면:
        - 제약 사항:
